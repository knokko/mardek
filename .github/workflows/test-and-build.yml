name: Testing and building executables

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt update && sudo apt install mesa-vulkan-drivers
      - uses: actions/checkout@v4
      - run: curl https://sdk.lunarg.com/sdk/download/1.4.313.0/linux/vulkansdk-linux-x86_64-1.4.313.0.tar.xz > vulkan-sdk.tar.xz
      - run: tar -xJf vulkan-sdk.tar.xz
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v4
      - run: source ./1.4.313.0/setup-env.sh && ./gradlew test -p vk2d && ./gradlew test -p state2d && ./gradlew test -p renderer2d && ./gradlew test -p game2d
      - name: Store test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/build/reports"
      - name: Store rendering results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rendering-results
          path: "game2d/rendering-test-results"
      - name: Store VK2D rendering results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rendering-results-vk2d
          path: "**/test-cases/actual"
      - name: Store JVM crashes
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-crashes
          path: "**/hs_err_pid**"
