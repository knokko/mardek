name: Build releases for Windows, Linux, and Java

on: [push, pull_request]

jobs:
  shadow-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'zulu'
      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew proguard
      - uses: actions/upload-artifact@v7
        with:
          name: shadow-jar
          path: ./game/build/libs/mardek.jar

  build-native-releases:
    runs-on: ${{ matrix.os.name }}
    needs: shadow-jar
    strategy:
      matrix:
        os:
          - name: windows-latest
            architecture: "windows-x64"
            java: "javaw.exe"
          - name: ubuntu-latest
            architecture: "linux-x64"
            java: "java"
    steps:
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'zulu'
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: shadow-jar
          path: with-all-natives
      - run: mkdir with-correct-natives && unzip -d with-correct-natives with-all-natives/mardek.jar

      - if: matrix.os.architecture != 'windows-x64'
        run: rm -R with-correct-natives/windows/x64
      - if: matrix.os.architecture != 'windows-arm64'
        run: rm -R with-correct-natives/windows/arm64
      - if: matrix.os.architecture != 'windows-x32'
        run: rm -R with-correct-natives/windows/x86

      - if: matrix.os.architecture != 'linux-x64'
        run: rm -R with-correct-natives/linux/x64
      - if: matrix.os.architecture != 'linux-arm64'
        run: rm -R with-correct-natives/linux/arm64
      - if: matrix.os.architecture != 'linux-riscv'
        run: rm -R with-correct-natives/linux/riscv64
      - if: matrix.os.architecture != 'linux-powerpc'
        run: rm -R with-correct-natives/linux/ppc64le
      - if: matrix.os.architecture != 'linux-arm32'
        run: rm -R with-correct-natives/linux/arm32

      - if: matrix.os.architecture != 'macos-x64'
        run: rm -R with-correct-natives/macos/x64
      - if: matrix.os.architecture != 'macos-arm64'
        run: rm -R with-correct-natives/macos/arm64

      - if: matrix.os.architecture != 'freebsd'
        run: rm -R with-correct-natives/freebsd

      - run: mkdir ./mardek-${{ matrix.os.architecture }}
      - run: jlink --module-path "%JAVA_HOME%/jmods" --add-modules java.base,jdk.unsupported --output ./mardek-${{ matrix.os.architecture }}/java-runtime
      - run: mv ./resources ./mardek-${{ matrix.os.architecture }}/resources
      - run: cd with-correct-natives && jar -cfM ../mardek-${{ matrix.os.architecture }}/resources/mardek.jar *

      - if: matrix.os.architecture == 'windows-x64'
        run: cp ./.github/run-on-windows.bat ./mardek-${{ matrix.os.architecture }}/mardek.bat
      - if: matrix.os.architecture == 'windows-x64'
        run: ./mardek-${{ matrix.os.architecture }}/mardek.bat self-test1

      - if: matrix.os.architecture == 'linux-x64'
        run: cp ./.github/run-on-linux ./mardek-${{ matrix.os.architecture }}/mardek
      - if: matrix.os.architecture == 'linux-x64'
        run: ./mardek-${{ matrix.os.architecture }}/mardek self-test1

      - uses: actions/upload-artifact@v7
        with:
          name: mardek-${{ matrix.os.architecture }}
          path: ./mardek-${{ matrix.os.architecture }}

  build-java-release:
    runs-on: ubuntu-latest
    needs: shadow-jar
    steps:
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'zulu'
      - uses: actions/checkout@v6
      - run: mkdir ./mardek-java
      - uses: actions/download-artifact@v7
        with:
          name: shadow-jar
          path: ./mardek-java

      - run: mv ./resources ./mardek-java/resources
      - run: cd mardek-java && java -jar ./mardek.jar self-test1

      - uses: actions/upload-artifact@v7
        with:
          name: mardek-java
          path: ./mardek-java

  build-fat-exe:
    runs-on: windows-latest
    needs: build-native-releases
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: mardek-windows-x64
          path: ./mardek-windows-x64
      - run: curl -L -o warp-packer-windows-latest.exe https://github.com/knokko/warp/releases/download/v0.4.6/warp-packer-windows-latest.exe
      - run: ./warp-packer-windows-latest.exe --arch windows-x64 --input-dir ./mardek-windows-x64 --exec java-runtime/bin/javaw.exe --output mardek-x64.exe --use-temp-directory --exec-args "-jar %APP_DIR%/resources/mardek.jar enable-logging %ARGS%"
      - run: ./mardek-x64.exe self-test1
      - uses: actions/upload-artifact@v4
        with:
          name: mardek-x64.exe
          path: mardek-x64.exe

  self-test-windows:
    runs-on: windows-latest
    needs: build-native-releases
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: mardek-windows-x64
          path: ./mardek-windows-x64
      - run: ./mardek-windows-x64/mardek.bat self-test1

  self-test-linux:
    runs-on: ubuntu-latest
    needs: build-native-releases
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: mardek-linux-x64
          path: ./mardek-linux-x64
      - run: chmod +x ./mardek-linux-x64/mardek
      - run: chmod +x ./mardek-linux-x64/java-runtime/bin/java
      - run: ./mardek-linux-x64/mardek self-test1

  self-test-java:
    runs-on: ${{ matrix.os.name }}
    needs: build-java-release
    strategy:
      matrix:
        os:
          - name: windows-latest
            extension: ".exe"
            architecture: "windows-x64"
          - name: windows-11-arm
            extension: ".exe"
            architecture: "windows-arm64"
          - name: ubuntu-latest
            extension: ""
            architecture: "linux-x64"
          - name: ubuntu-24.04-arm
            extension: ""
            architecture: "linux-arm64"
          - name: macos-latest
            extension: ""
            architecture: "macos-arm64"
          - name: macos-15-intel
            extension: ""
            architecture: "macos-x64"
    steps:
      - uses: actions/setup-java@v5
        name: Set up JDK 25
        with:
          java-version: 25
          distribution: 'zulu'
      - uses: actions/download-artifact@v7
        with:
          name: mardek-java
          path: ./mardek-java
      - run: cd mardek-java && java -jar ./mardek.jar self-test1
