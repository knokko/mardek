name: Testing BC7 compression

on: push

permissions:
  contents: read

jobs:
  bc7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp importer/src/main/resources/mardek/importer/bc7/* ./
      - run: cp importer/src/main/resources/mardek/importer/ui/TitleScreenBackground.png ./TitleScreenBackground.png
      - run: unzip ispc-linux.zip
      - run: ls
      - run: PATH="$PWD/:$PATH"
      - run: echo "$PWD/" >> "$GITHUB_PATH"
      - run: echo $PATH
      - run: echo $PWD
      - run: echo $GITHUB_PATH
      - run: PATH="$PWD/:$PATH" ./bc7enc-linux TitleScreenBackground.png
      - uses: actions/upload-artifact@v4
        with:
          name: TitleScreenBackground
          path: ./TitleScreenBackground.dds
